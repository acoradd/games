server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Compression gzip
    gzip on;
    gzip_vary on;       # Ajoute "Vary: Accept-Encoding" pour les CDN/proxies
    gzip_proxied any;   # Compresse aussi les réponses vers les proxies
    gzip_comp_level 6;  # Bon compromis vitesse/taux (1=rapide, 9=max)
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/html
        text/javascript
        application/json
        application/javascript
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # index.html : jamais mis en cache
    # → le navigateur revalide à chaque visite et récupère les nouveaux hashes Vite
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Assets statiques avec hash dans le nom (ex: index.a1b2c3d4.js)
    # → cache 1 an, immuable : le hash change à chaque build si le contenu change
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA fallback : toutes les routes React vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
