name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  server:
    name: Server — build & test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: games
          POSTGRES_PASSWORD: games
          POSTGRES_DB: games
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U games"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://games:games@localhost:5432/games?schema=games
      JWT_SECRET: ci_secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install
        working-directory: server
        run: npm ci
      - name: Migrate
        working-directory: server
        run: npx prisma migrate deploy
      - name: Build
        working-directory: server
        run: npm run build
      - name: Test
        working-directory: server
        run: npm test

  client:
    name: Client — type-check & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install
        working-directory: client
        run: npm ci
      - name: Type-check
        working-directory: client
        run: npx tsc --noEmit
      - name: Build
        working-directory: client
        run: npm run build
